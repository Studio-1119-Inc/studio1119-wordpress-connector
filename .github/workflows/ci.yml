name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: PHP Lint & PHPCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: cs2pr, phpcs

      - name: Install WordPress coding standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev wp-coding-standards/wpcs:"^3.0" dealerdirect/phpcodesniffer-composer-installer:"^1.0"

      - name: PHP syntax check
        run: find src/ -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: PHPCS
        run: phpcs --standard=WordPress --extensions=php --ignore=*/vendor/* src/

  build:
    name: Build (${{ matrix.app }} / ${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [cataseo, trusync]
        env: [production, staging, development]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y jq zip

      - name: Run build
        run: bash build/build.sh ${{ matrix.app }} ${{ matrix.env }} 0.0.0-ci

      - name: Verify zip exists
        run: ls -lh dist/*.zip
